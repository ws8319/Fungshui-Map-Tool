<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK Map - Fung Shui Tool</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; }
        #map { width: 100%; height: 100vh; cursor: crosshair; }

        /* Container for the Tool */
        #fs-tool {
            position: absolute;
            display: none; /* Hidden until right-click */
            pointer-events: none;
            z-index: 2000;
            transform: translate(-50%, -50%); /* Center on coordinates */
        }

        /* The Stationary Chinese Compass */
        #chinese-compass {
            position: absolute;
            width: 500px;
            height: 500px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2002;
            opacity: 0.7;
        }

        /* The Rotatable Red Cross */
        #red-cross {
            position: absolute;
            width: 600px;
            height: 600px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(0deg);
            z-index: 2001;
            pointer-events: auto; /* Allow dragging */
            cursor: grab;
        }

        .cross-line {
            position: absolute;
            background: rgba(255, 0, 0, 0.8);
        }
        .v-line { width: 2px; height: 100%; left: 50%; top: 0; transform: translateX(-50%); }
        .h-line { width: 100%; height: 2px; top: 50%; left: 0; transform: translateY(-50%); }

        #instr {
            position: absolute;
            bottom: 10px; left: 10px;
            background: rgba(255,255,255,0.8);
            padding: 10px;
            z-index: 3000;
            border-radius: 5px;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div id="instr">
        <b>Right-Click</b> to place center | <b>Drag Red Cross</b> to rotate
    </div>
    <div id="map"></div>

    <div id="fs-tool">
        <div id="red-cross">
            <div class="cross-line v-line"></div>
            <div class="cross-line h-line"></div>
        </div>
        
        <svg id="chinese-compass" viewBox="0 0 200 200">
            <circle cx="100" cy="100" r="95" fill="rgba(255,255,255,0.3)" stroke="#333" stroke-width="1"/>
            <g id="markings"></g>
        </svg>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', { contextmenu: true }).setView([22.2850, 114.1722], 18);
        
        // Base Map (Centamap Style)
        L.tileLayer('https://mapapi.geodata.gov.hk/gs/api/v1.0.0/xyz/basemap/wgs84/{z}/{x}/{y}.png').addTo(map);
        L.tileLayer('https://mapapi.geodata.gov.hk/gs/api/v1.0.0/xyz/label/hk/tc/wgs84/{z}/{x}/{y}.png').addTo(map);

        const tool = document.getElementById('fs-tool');
        const redCross = document.getElementById('red-cross');
        const markingsG = document.getElementById('markings');
        
        // Generate 24 Mountains (子 = 0 deg)
        const mountains = ["子","癸","丑","艮","寅","甲","卯","乙","辰","巽","巳","丙","午","丁","未","坤","申","庚","酉","辛","戌","乾","亥","壬"];
        mountains.forEach((name, i) => {
            const angle = i * 15;
            const rad = (angle - 90) * (Math.PI / 180);
            const x = 100 + 82 * Math.cos(rad);
            const y = 100 + 82 * Math.sin(rad);
            
            let text = document.createElementNS("http://www.w3.org/2000/svg", "text");
            text.setAttribute("x", x);
            text.setAttribute("y", y);
            text.setAttribute("fill", i % 3 === 0 ? "red" : "black");
            text.setAttribute("font-size", "8");
            text.setAttribute("text-anchor", "middle");
            text.setAttribute("alignment-baseline", "middle");
            text.setAttribute("transform", `rotate(${angle}, ${x}, ${y})`);
            text.textContent = name;
            markingsG.appendChild(text);

            let line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("x1", 100 + 70 * Math.cos(rad));
            line.setAttribute("y1", 100 + 70 * Math.sin(rad));
            line.setAttribute("x2", 100 + 95 * Math.cos(rad));
            line.setAttribute("y2", 100 + 95 * Math.sin(rad));
            line.setAttribute("stroke", "#999");
            markingsG.appendChild(line);
        });

        // Right-click to place tool
        map.on('contextmenu', (e) => {
            tool.style.display = 'block';
            const containerPoint = map.latLngToContainerPoint(e.latlng);
            tool.style.left = containerPoint.x + 'px';
            tool.style.top = containerPoint.y + 'px';
            
            // Move tool when map pans
            map.on('move', () => {
                const newPos = map.latLngToContainerPoint(e.latlng);
                tool.style.left = newPos.x + 'px';
                tool.style.top = newPos.y + 'px';
            });
        });

        // Rotation Logic
        let isDragging = false;
        let startAngle = 0;
        let currentRotation = 0;

        redCross.addEventListener('mousedown', (e) => {
            isDragging = true;
            redCross.style.cursor = 'grabbing';
            const rect = redCross.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            startAngle = Math.atan2(e.clientY - centerY, e.clientX - centerX) * (180 / Math.PI) - currentRotation;
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const rect = redCross.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const angle = Math.atan2(e.clientY - centerY, e.clientX - centerX) * (180 / Math.PI);
            currentRotation = angle - startAngle;
            redCross.style.transform = `translate(-50%, -50%) rotate(${currentRotation}deg)`;
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
            redCross.style.cursor = 'grab';
        });
    </script>
</body>
</html>
